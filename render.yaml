databases:
  - name: expense-db
    plan: free
    databaseName: expense_db
    user: expense_user

services:
  - type: web
    name: expense-api
    plan: free
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npx prisma generate --schema=packages/db/prisma/schema.prisma && npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma && cd apps/api && npx tsc
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://expense-app.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
    healthCheckPath: /api/health
