name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: expense_user
          POSTGRES_PASSWORD: expense_pass
          POSTGRES_DB: expense_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Typecheck API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Typecheck shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Run API tests
        run: cd apps/api && npx vitest run
        env:
          DATABASE_URL: postgresql://expense_user:expense_pass@localhost:5432/expense_test_db
          JWT_SECRET: ci-test-jwt-secret-key
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key
          NODE_ENV: test
          LOG_LEVEL: silent

      - name: Build web app
        run: cd apps/web && npx next build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd apps/web && npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
